<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravatiel | Catálogo Exclusivo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./public/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGold: '#C5A044',
                        brandBlack: '#000000',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-brandBlack">

    <nav class="fixed w-full bg-brandBlack/95 text-white shadow-xl z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex-shrink-0 flex items-center gap-2">
                <img src="./public/img/gravatiel.jpeg" alt="Logo Gravatiel" class="h-12 w-auto rounded-full">
                <a href="#" class="logo-font text-2xl font-bold tracking-widest text-white hidden sm:block">GRAVATIEL</a>
            </div>
            <div class="hidden md:flex space-x-8 font-medium text-xs uppercase tracking-[0.2em]">
                <a href="#destaques" class="hover:text-brandGold transition duration-300">Destaques</a>
                <a href="#sobre" class="hover:text-brandGold transition duration-300">Sobre</a>
                <a href="#catalogo" class="hover:text-brandGold transition duration-300">Catálogo</a>
                <a href="#contato" class="hover:text-brandGold transition duration-300">Contato</a>
            </div>
            <div class="flex items-center space-x-5">
                <a href="#" class="text-xl hover:text-brandGold transition"><i class="bi bi-whatsapp"></i></a>
                <a href="#" class="text-xl hover:text-brandGold transition"><i class="bi bi-instagram"></i></a>
            </div>
        </div>
    </nav>

    <section id="destaques" class="min-h-screen bg-white flex flex-col justify-center pt-20">
        <div class="text-center mb-8">
            <h2 class="logo-font text-3xl uppercase tracking-widest">Coleção Premium</h2>
            <p class="text-brandGold font-bold tracking-[0.3em] text-xs">LANÇAMENTOS</p>
        </div>
        
        <div class="owl-carousel owl-theme px-4 md:px-20">
            <div class="item p-4 text-center">
                <img src="https://images.unsplash.com/photo-1589756823851-411590bc53b1?auto=format&fit=crop&q=80&w=500" alt="Gravata Ouro" class="rounded-sm mb-4 shadow-lg grayscale hover:grayscale-0 transition duration-500">
                <h4 class="font-bold uppercase text-sm tracking-widest">Seda Ouro Imperial</h4>
            </div>
            <div class="item p-4 text-center">
                <img src="https://images.unsplash.com/photo-1621335829175-95f437384d7c?auto=format&fit=crop&q=80&w=500" alt="Gravata Dark" class="rounded-sm mb-4 shadow-lg grayscale hover:grayscale-0 transition duration-500">
                <h4 class="font-bold uppercase text-sm tracking-widest">Black Tie Premium</h4>
            </div>
            <div class="item p-4 text-center">
                <img src="https://images.unsplash.com/photo-1594938298603-c8148c4dae35?auto=format&fit=crop&q=80&w=500" alt="Gravata Royal" class="rounded-sm mb-4 shadow-lg grayscale hover:grayscale-0 transition duration-500">
                <h4 class="font-bold uppercase text-sm tracking-widest">Azul Meia-Noite</h4>
            </div>
            <div class="item p-4 text-center">
                <img src="https://images.unsplash.com/photo-1617137968427-85924c800a22?auto=format&fit=crop&q=80&w=500" alt="Gravata Textura" class="rounded-sm mb-4 shadow-lg grayscale hover:grayscale-0 transition duration-500">
                <h4 class="font-bold uppercase text-sm tracking-widest">Vinho Texturizado</h4>
            </div>
        </div>
    </section>

    <header id="sobre" class="min-h-screen flex flex-col justify-center items-center px-4 text-center bg-brandBlack text-white border-b-4 border-brandGold">
        <h1 class="logo-font text-5xl md:text-8xl mb-4 uppercase tracking-tighter">Elegância em cada nó.</h1>
        <p class="text-gray-400 max-w-2xl mx-auto text-lg font-light italic">Acessórios premium para quem não abre mão do prestígio.</p>
        <a href="#catalogo" class="mt-8 px-8 py-3 border border-brandGold text-brandGold uppercase tracking-widest hover:bg-brandGold hover:text-black transition duration-500">Ver Coleção</a>
    </header>

    <script>
        $(document).ready(function(){
            $(".owl-carousel").owlCarousel({
                loop: true,
                margin: 20,
                nav: false,
                dots: true,
                autoplay: true,
                autoplayTimeout: 3000,
                responsive:{
                    0:{ items: 1 },
                    600:{ items: 2 },
                    1000:{ items: 3 }
                }
            });
        });
    </script>
    <script src="./public/js/script.js"></script>
</body>
</html>
